<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salvador Shopping</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    header {
      background-color: #111;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .search {
      flex: 1;
      margin: 0 20px;
    }

    .search input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    .nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
    }

    .banner {
      background: linear-gradient(90deg, #ffcc00, #ff9900);
      padding: 60px 20px;
      text-align: center;
    }

    .banner h1 {
      margin: 0;
      font-size: 40px;
    }

    .banner p {
      margin-top: 10px;
      font-size: 18px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .price {
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
      margin-top: 30px;
    }

    /* LOGIN */
    #loginBox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    #loginBox div {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    #loginBox input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    #loginBox button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">Salvador Shopping</div>

    <div class="search">
      <input type="text" placeholder="Buscar produtos...">
    </div>

    <div class="nav">
      <a href="#" onclick="openLogin()">Entrar</a>
      <a href="#">Carrinho</a>
    </div>
  </header>

  <section class="banner">
    <h1>Salvador Shopping</h1>
    <p>As melhores ofertas em um só lugar</p>
    <button class="btn">Ver ofertas</button>
  </section>

  <section class="products">
    <div class="card">
      <h3>Camisa Premium</h3>
      <p class="price">R$ 99,90</p>
    </div>

    <div class="card">
      <h3>Headset Gamer</h3>
      <p class="price">R$ 199,90</p>
    </div>

    <div class="card">
      <h3>Perfume Importado</h3>
      <p class="price">R$ 249,90</p>
    </div>
  </section>

  <footer>
    © 2026 Salvador Shopping - Todos os direitos reservados
  </footer>
<!-- 🔥 FIREBASE SDK (sempre primeiro) -->
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-analytics.js"></script>

<!-- 🔥 CONFIG FIREBASE -->
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBLGp8UQr_5ZN4FEeHkySMtOPPz7QClu-8",
    authDomain: "salavador-shopping.firebaseapp.com",
    projectId: "salavador-shopping",
    storageBucket: "salavador-shopping.firebasestorage.app",
    messagingSenderId: "709828325994",
    appId: "1:709828325994:web:db9637dde9e581fbe15013",
    measurementId: "G-8D3SYT6236"
  };

  firebase.initializeApp(firebaseConfig);
</script>

<!-- 🔥 SISTEMA DE LOGIN -->
<script>
  function openLogin() {
    document.getElementById("loginBox").style.display = "flex";
  }

  function closeLogin() {
    document.getElementById("loginBox").style.display = "none";
  }

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    firebase.auth().signInWithEmailAndPassword(email, password)
      .then(() => {
        alert("Login feito com sucesso!");
        closeLogin();
      })
      .catch((error) => {
        alert(error.message);
      });
  }

  function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    firebase.auth().createUserWithEmailAndPassword(email, password)
      .then(() => {
        alert("Conta criada com sucesso!");
        closeLogin();
      })
      .catch((error) => {
        alert(error.message);
      });
  }
</script>
