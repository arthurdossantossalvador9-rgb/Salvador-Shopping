<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salvador Shopping</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

/* HEADER */
header {
  background: #111;
  color: white;
  padding: 15px 20px;
  display: flex;
  align-items: center;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.search {
  flex: 1;
  margin: 0 20px;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

.nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

/* BANNER */
.banner {
  background: linear-gradient(90deg,#ffcc00,#ff9900);
  text-align: center;
  padding: 60px 20px;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  background: black;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* PRODUTOS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.price {
  color: green;
  font-weight: bold;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

/* LOGIN MODAL */
#loginBox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

.login-card {
  background: white;
  padding: 25px;
  width: 320px;
  border-radius: 12px;
  animation: fadeIn 0.3s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.login-card h2 {
  margin-bottom: 15px;
}

.login-card input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  transition: 0.2s;
}

.login-card input:focus {
  border-color: #ff9900;
  outline: none;
}

.login-btn {
  width: 100%;
  padding: 12px;
  background: #ff9900;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

.close-btn {
  margin-top: 10px;
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">Salvador Shopping</div>

  <div class="search">
    <input type="text" placeholder="Buscar produtos...">
  </div>

  <div class="nav">
    <a href="#" onclick="openLogin()">Entrar</a>
    <a href="#">Carrinho</a>
  </div>
</header>

<section class="banner">
  <h1>Salvador Shopping</h1>
  <p>As melhores ofertas em um só lugar</p>
  <button class="btn">Ver ofertas</button>
</section>

<section class="products">
  <div class="card">
    <h3>Camisa Premium</h3>
    <p class="price">R$ 99,90</p>
  </div>

  <div class="card">
    <h3>Headset Gamer</h3>
    <p class="price">R$ 199,90</p>
  </div>

  <div class="card">
    <h3>Perfume Importado</h3>
    <p class="price">R$ 249,90</p>
  </div>
</section>

<footer>
  © 2026 Salvador Shopping
</footer>

<!-- LOGIN MODAL -->
<div id="loginBox">
  <div class="login-card">
    <h2>Entrar</h2>
    <input type="email" id="email" placeholder="Seu email">
    <input type="password" id="senha" placeholder="Sua senha">
    <button class="login-btn" onclick="login()">Entrar</button>
    <button class="close-btn" onclick="fecharLogin()">Cancelar</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "salavador-shopping.firebaseapp.com",
  projectId: "salavador-shopping",
  appId: "SUA_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .then(() => {
      alert("Login realizado!");
      fecharLogin();
    })
    .catch(err => alert(err.message));
}
</script>

<script>
function openLogin() {
  document.getElementById("loginBox").style.display = "flex";
}

function fecharLogin() {
  document.getElementById("loginBox").style.display = "none";
}
</script>

</body>
</html>
