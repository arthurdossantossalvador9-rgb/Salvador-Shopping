<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salvador Shopping</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
}

/* HEADER */
header {
  background: #111;
  color: white;
  padding: 15px 20px;
  display: flex;
  align-items: center;
}

.logo {
  font-weight: bold;
  font-size: 22px;
}

.search {
  flex: 1;
  margin: 0 20px;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

.nav {
  display: flex;
  align-items: center;
}

.nav span {
  margin-right: 10px;
}

.nav button {
  background: #ff9900;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  color: white;
}

/* BANNER */
.banner {
  background: linear-gradient(90deg,#ffcc00,#ff9900);
  text-align: center;
  padding: 60px 20px;
}

/* PRODUTOS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.price {
  color: green;
  font-weight: bold;
}

/* MODAL */
#authBox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.auth-card {
  background: white;
  padding: 30px;
  width: 350px;
  border-radius: 12px;
  animation: fade 0.3s;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1;}
}

.auth-card h2 {
  text-align: center;
}

.auth-card input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.auth-card button {
  width: 100%;
  padding: 12px;
  background: #ff9900;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

.switch {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #ff9900;
}

.error {
  color: red;
  font-size: 14px;
  text-align: center;
}

.success {
  color: green;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <div class="logo">Salvador Shopping</div>

  <div class="search">
    <input type="text" placeholder="Buscar produtos...">
  </div>

  <div class="nav">
    <span id="userName"></span>
    <button onclick="abrirAuth()">Entrar</button>
    <button onclick="logout()">Sair</button>
  </div>
</header>

<section class="banner">
  <h1>As melhores ofertas</h1>
</section>

<section class="products">
  <div class="card">
    <h3>Camisa Premium</h3>
    <p class="price">R$ 99,90</p>
  </div>
  <div class="card">
    <h3>Headset Gamer</h3>
    <p class="price">R$ 199,90</p>
  </div>
</section>

<!-- MODAL LOGIN/CADASTRO -->
<div id="authBox">
  <div class="auth-card">
    <h2 id="titulo">Entrar</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <div id="msg"></div>

    <button onclick="acaoPrincipal()">Entrar</button>
    <div class="switch" onclick="alternarModo()">Criar conta</div>

    <button onclick="fecharAuth()">Cancelar</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "salvador-shopping.firebaseapp.com",
  projectId: "salvador-shopping",
  appId: "SUA_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let modoLogin = true;

// alternar login/cadastro
window.alternarModo = function() {
  modoLogin = !modoLogin;

  document.getElementById("titulo").innerText = modoLogin ? "Entrar" : "Cadastrar";
  document.querySelector(".switch").innerText = modoLogin ? "Criar conta" : "Já tenho conta";
  document.querySelector(".auth-card button").innerText = modoLogin ? "Entrar" : "Cadastrar";
}

// ação principal
window.acaoPrincipal = function() {
  const email = email.value;
  const senha = senha.value;
  const msg = document.getElementById("msg");

  msg.innerHTML = "";

  if(modoLogin){
    signInWithEmailAndPassword(auth, email, senha)
      .then(() => {
        msg.innerHTML = "<div class='success'>Login feito!</div>";
        fecharAuth();
      })
      .catch(err => msg.innerHTML = "<div class='error'>" + err.message + "</div>");
  } else {
    createUserWithEmailAndPassword(auth, email, senha)
      .then(() => {
        msg.innerHTML = "<div class='success'>Conta criada!</div>";
      })
      .catch(err => msg.innerHTML = "<div class='error'>" + err.message + "</div>");
  }
}

// estado do usuário
onAuthStateChanged(auth, user => {
  const userName = document.getElementById("userName");

  if(user){
    userName.innerText = user.email;
  } else {
    userName.innerText = "";
  }
});

// logout
window.logout = function() {
  signOut(auth);
}

// modal
window.abrirAuth = function() {
  document.getElementById("authBox").style.display = "flex";
}

window.fecharAuth = function() {
  document.getElementById("authBox").style.display = "none";
}
</script>

</body>
</html>
